<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>oone — Josh Harrison</title>
<meta name="description" content="Josh Harrison — designer at Wesley Moon Inc., Brooklyn. Architecture, interiors, and spatial work.">
<meta property="og:site_name" content="oone">
<meta property="og:title" content="oone — Josh Harrison">
<meta property="og:description" content="Josh Harrison — designer at Wesley Moon Inc., Brooklyn. Architecture, interiors, spatial work.">
<meta property="og:type" content="website">
<link rel="stylesheet" href="https://use.typekit.net/ifo7ejx.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fs-xs:clamp(9px,.75vw,11px);--fs-sm:clamp(10px,.9vw,12px);--fs-md:clamp(13px,1.1vw,15px);--fs-lg:clamp(20px,2vw,24px);--fs-xl:clamp(28px,3.2vw,38px);--fs-2xl:clamp(32px,4vw,52px);--fs-display:clamp(52px,7vw,96px);--sp:clamp(10px,1.2vw,14px);
  --f-disp:"freight-display-pro","Cormorant Garamond","Cormorant",Georgia,serif;
  --f-text:"freight-text-pro","Cormorant","Cormorant Garamond",Georgia,serif;
  --f-mono:"bitcount-mono-double","bitcount-mono-single","bitcount-mono","IBM Plex Mono","Space Mono",monospace;
}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#17120F;color:#F2EAD8}
canvas{display:block}
#cv{position:fixed;inset:0;z-index:4;pointer-events:auto}
@media(pointer:fine){body{cursor:none}}
#cur{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);display:none}
@media(pointer:fine){#cur{display:block}}

/* ── KINETIC ANIMATIONS ── */
@keyframes ooLogoBreathe{0%,100%{opacity:.28}50%{opacity:.46}}
@keyframes ooMarkSway{0%,100%{transform:translate(-50%,-50%) skewX(-28deg)}48%{transform:translate(-50%,-50%) skewX(-29.4deg) scaleY(1.006)}}
@keyframes ooMirrorSway{0%,100%{transform:translate(-50%,-50%) scaleX(-1) skewX(-28deg) scale(.86)}48%{transform:translate(-50%,-50%) scaleX(-1) skewX(-26.8deg) scale(.872)}}
@keyframes ooNavDrift{0%,100%{letter-spacing:.16em;opacity:.26}50%{letter-spacing:.20em;opacity:.38}}
@keyframes ooMonoDrift{0%,100%{letter-spacing:.16em;opacity:1}50%{letter-spacing:.22em;opacity:.88}}
@keyframes ooDwCatDrift{0%,100%{letter-spacing:.18em}50%{letter-spacing:.24em}}
@keyframes ooHairlineIn{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}
@keyframes ooneSerifShimmer{0%,100%{opacity:1;transform:translateY(0)}50%{opacity:.94;transform:translateY(-.04em)}}
@keyframes oonePeek{from{opacity:0;transform:translateY(.55em) skewX(-4.5deg);letter-spacing:.06em;filter:blur(5px)}to{opacity:1;transform:translateY(0) skewX(0);letter-spacing:normal;filter:blur(0)}}
@keyframes ooGlassShimmer{0%,100%{text-shadow:0 0 0 transparent}50%{text-shadow:0 0 22px rgba(255,220,160,.07)}}

.oone-peek{opacity:0}
#dw-body.oone-stag .oone-peek{animation:oonePeek .88s cubic-bezier(.16,1,.3,1) forwards;animation-delay:var(--od,0s)}
#dw-body.oone-stag .oone-peek.oone-serif-drift{animation:oonePeek .88s cubic-bezier(.16,1,.3,1) forwards,ooneSerifShimmer 9s ease-in-out infinite;animation-delay:var(--od,0s),calc(var(--od,0s) + 0.9s)}

/* ── LOGO ── */
.oo-mark{position:relative;display:inline-block;width:2ex;height:1.55ex;vertical-align:baseline;overflow:visible}
.oo-mark .o1,.oo-mark .o2{position:absolute;left:50%;top:55%;font-family:var(--f-disp);font-style:italic;line-height:1;transform-origin:center center;user-select:none;font-size:2.6ex}
.oo-mark .o1{font-weight:400;transform:translate(-50%,-50%) skewX(-28deg);animation:ooMarkSway 9s ease-in-out infinite}
.oo-mark .o2{font-weight:300;transform:translate(-50%,-50%) scaleX(-1) skewX(-28deg) scale(0.86);-webkit-text-fill-color:transparent;-webkit-text-stroke:.8px currentColor;animation:ooMirrorSway 9s ease-in-out infinite}
.oo-word{font-family:var(--f-disp);font-style:italic;font-weight:300;display:inline;line-height:1}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:600;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;pointer-events:none}
#nav.vis{pointer-events:all}
.nav-left{pointer-events:all}
.nav-brand{cursor:pointer;transition:opacity .3s;opacity:.28;display:inline-flex;align-items:baseline;animation:ooLogoBreathe 8s ease-in-out infinite}
.nav-brand:hover{opacity:.60;animation:none}
.nav-links{display:flex;gap:0;pointer-events:all}
.nav-link{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.16em;text-transform:uppercase;color:rgba(242,234,216,.26);padding:6px 16px;cursor:pointer;transition:all .25s;border:none;background:none;position:relative;-webkit-tap-highlight-color:transparent;animation:ooNavDrift 13s ease-in-out infinite}
.nav-link:hover{color:rgba(242,234,216,.60);animation:none;letter-spacing:.20em}
.nav-link.on{color:rgba(242,234,216,.68);animation:none}
.nav-link.on::after{content:'';position:absolute;bottom:2px;left:16px;right:16px;height:1px;background:rgba(242,234,216,.20);animation:ooHairlineIn .4s cubic-bezier(.16,1,.3,1) forwards}
.nav-drop{position:relative}
.nav-drop-menu{display:none;position:absolute;top:100%;left:0;background:rgba(12,9,7,.96);border:1px solid rgba(242,234,216,.07);backdrop-filter:blur(16px);padding:4px 0;min-width:120px;z-index:10}
.nav-drop.open .nav-drop-menu{display:block}
.nav-drop-item{display:block;width:100%;padding:8px 16px;background:none;border:none;font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.12em;text-transform:uppercase;color:rgba(242,234,216,.30);cursor:pointer;text-align:left;transition:color .15s}
.nav-drop-item:hover{color:rgba(242,234,216,.68)}
.nav-right{display:flex;align-items:center;gap:10px;pointer-events:all}
.tp-btn{display:flex;align-items:center;gap:6px;padding:4px 10px;background:transparent;border:1px solid rgba(242,234,216,.07);cursor:pointer;font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.10em;text-transform:uppercase;color:rgba(242,234,216,.20);transition:all .25s}
.tp-btn:hover{color:rgba(242,234,216,.58);border-color:rgba(242,234,216,.20)}

/* ── KEY PANEL ── */
#panel-key{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,12px));left:20px;z-index:200;background:rgba(12,9,7,.88);border:1px solid rgba(242,234,216,.06);backdrop-filter:blur(14px);padding:var(--sp) calc(var(--sp)*1.2);min-width:130px}
#panel-filter{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,12px));right:20px;z-index:200;background:rgba(12,9,7,.88);border:1px solid rgba(242,234,216,.06);backdrop-filter:blur(14px);padding:var(--sp) calc(var(--sp)*1.2);min-width:140px}
.pk-head{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.16em;text-transform:uppercase;color:rgba(242,234,216,.14);padding-bottom:6px;border-bottom:1px solid rgba(242,234,216,.05);margin-bottom:6px;animation:ooMonoDrift 14s ease-in-out infinite}
.pk-row{display:flex;align-items:center;gap:10px;padding:4px 0;cursor:pointer;min-height:24px}
.pk-row:hover .pk-lbl{color:rgba(242,234,216,.72)}
.pk-lbl{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.10em;text-transform:uppercase;color:rgba(242,234,216,.26);transition:color .15s;user-select:none}
.pk-row.on .pk-lbl{color:rgba(242,234,216,.62)}
.pk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:opacity .2s}
.pk-row.dim .pk-dot{opacity:.25}
.pk-row.dim .pk-lbl{color:rgba(242,234,216,.14)}
.pk-sub{padding-left:16px}
.pk-sub .pk-row{min-height:20px}
.pk-circ{width:7px;height:7px;border-radius:50%;border:1px solid rgba(242,234,216,.22);flex-shrink:0;transition:all .15s}
.pk-toggle{position:relative;width:26px;height:14px;border-radius:7px;background:rgba(242,234,216,.10);border:1px solid rgba(242,234,216,.12);cursor:pointer;flex-shrink:0;transition:background .2s}
.pk-toggle.on{background:rgba(242,234,216,.20);border-color:rgba(242,234,216,.26)}
.pk-toggle::after{content:'';position:absolute;top:2px;left:2px;width:8px;height:8px;border-radius:50%;background:rgba(242,234,216,.32);transition:all .2s}
.pk-toggle.on::after{left:14px;background:rgba(242,234,216,.68)}

/* ── DRAWER ── */
#drawer{position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--bar-bg,rgba(11,8,6,.98));border-top:1px solid rgba(242,234,216,.06);transform:translateY(100%);transition:height .3s ease;height:50vh;display:flex;flex-direction:column;overflow:hidden}
#drawer.open{transform:translateY(0)}
#drawer.expanded{height:100vh;height:100dvh}
.drawer-open #panel-key,.drawer-open #panel-filter{display:none}
.dw-head{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;padding-top:max(12px,env(safe-area-inset-top,12px));border-bottom:1px solid rgba(242,234,216,.05);flex-shrink:0}
.dw-cat{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.18em;text-transform:uppercase;color:rgba(242,234,216,.26);animation:ooDwCatDrift 12s ease-in-out infinite}
.dw-acts{display:flex;gap:10px;align-items:center}
.dw-btn{background:none;border:none;cursor:pointer;font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.12em;text-transform:uppercase;color:rgba(242,234,216,.26);padding:4px 8px;transition:color .15s;-webkit-tap-highlight-color:transparent}
.dw-btn:hover{color:rgba(242,234,216,.72)}
.dw-body{flex:1;overflow-y:auto;padding:20px 24px 28px;padding-bottom:max(28px,env(safe-area-inset-bottom,28px));-webkit-overflow-scrolling:touch}

/* ── SHARED ── */
.dw-facts{border-top:1px solid rgba(242,234,216,.06);margin-bottom:14px}
.dw-fact{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid rgba(242,234,216,.05)}
.dw-fk{width:80px;flex-shrink:0;font-family:var(--f-mono);font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.06em;color:rgba(242,234,216,.20)}
.dw-fv{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.50)}
.about-wrap{display:grid;grid-template-columns:1.1fr .9fr;gap:28px}
@media(max-width:640px){.about-wrap{grid-template-columns:1fr}}
.about-name{font-family:var(--f-disp);font-style:italic;font-size:clamp(36px,5vw,56px);color:rgba(242,234,216,.90);margin-bottom:14px;animation:ooGlassShimmer 10s ease-in-out infinite}
.about-bio{font-family:var(--f-text);font-size:var(--fs-md);line-height:1.80;color:rgba(242,234,216,.40);margin-bottom:10px}
.about-bio strong{color:rgba(242,234,216,.70);font-weight:500}
.stat-n{font-family:var(--f-disp);font-size:clamp(24px,3.5vw,32px);line-height:1}
.stat-l{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.12em;text-transform:uppercase;color:rgba(242,234,216,.18);margin-bottom:14px}
.cv-toggle{background:none;border:1px solid rgba(242,234,216,.08);cursor:pointer;font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.10em;text-transform:uppercase;color:rgba(242,234,216,.26);padding:6px 12px;margin-top:10px;transition:all .15s}
.cv-toggle:hover{color:rgba(242,234,216,.62)}
.cv-panel{max-height:0;overflow:hidden;transition:max-height .4s ease}
.cv-panel.open{max-height:2000px}
.cv-sec-title{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.14em;text-transform:uppercase;color:rgba(242,234,216,.16);padding-bottom:5px;border-bottom:1px solid rgba(242,234,216,.05);margin:16px 0 8px}
.cv-role-title{font-family:var(--f-text);font-style:italic;font-size:var(--fs-md);color:rgba(242,234,216,.65)}
.cv-role-date{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.18);float:right}
.cv-role-org{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.28);margin-bottom:4px}
.cv-role-desc{font-family:var(--f-text);font-size:var(--fs-sm);line-height:1.7;color:rgba(242,234,216,.26)}
.skills{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.skill{font-family:var(--f-mono);font-size:var(--fs-xs);padding:3px 7px;border:1px solid rgba(242,234,216,.06);color:rgba(242,234,216,.20)}
.dw-divider{border:none;border-top:1px solid rgba(242,234,216,.05);margin:18px 0}
.brand-lbl{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.16em;text-transform:uppercase;color:rgba(242,234,216,.10);margin-bottom:8px}
.brand-name{font-family:var(--f-disp);font-style:italic;font-size:var(--fs-lg);color:rgba(242,234,216,.44);margin-bottom:8px}
.brand-p{font-family:var(--f-text);font-size:var(--fs-md);line-height:1.78;color:rgba(242,234,216,.24);margin-bottom:6px}

/* ── SERVICES ── */
.svc-grid{display:grid;gap:12px}
.svc{padding:14px 16px;border:1px solid rgba(242,234,216,.05);background:rgba(242,234,216,.008);transition:border-color .3s}
.svc:hover{border-color:rgba(242,234,216,.12)}
.svc-name{font-family:var(--f-disp);font-style:italic;font-size:var(--fs-lg);color:rgba(242,234,216,.66);margin-bottom:6px}
.svc-desc{font-family:var(--f-text);font-size:var(--fs-md);line-height:1.72;color:rgba(242,234,216,.28);margin-bottom:8px}
.svc-rate{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.18)}
.svc-ex{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.12);margin-top:4px}
.contact{margin-top:16px;padding-top:14px;border-top:1px solid rgba(242,234,216,.05)}
.contact-title{font-family:var(--f-disp);font-style:italic;font-size:var(--fs-lg);color:rgba(242,234,216,.44);margin-bottom:12px}
.dw-input{width:100%;background:none;border:none;border-bottom:1px solid rgba(242,234,216,.08);font-family:var(--f-text);font-size:var(--fs-md);color:rgba(242,234,216,.65);outline:none;padding:6px 0;margin-bottom:10px}
.dw-input::placeholder{color:rgba(242,234,216,.16);font-style:italic}
.dw-textarea{width:100%;background:none;border:none;border-bottom:1px solid rgba(242,234,216,.08);font-family:var(--f-text);font-size:var(--fs-md);color:rgba(242,234,216,.65);outline:none;padding:6px 0;margin-bottom:10px;min-height:60px;resize:vertical}
.dw-textarea::placeholder{color:rgba(242,234,216,.16);font-style:italic}
.dw-send{padding:6px 14px;background:none;border:1px solid rgba(242,234,216,.12);font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.14em;text-transform:uppercase;color:rgba(242,234,216,.34);cursor:pointer;transition:all .15s}
.dw-send:hover{background:rgba(242,234,216,.04);color:rgba(242,234,216,.78)}

/* ── LOG ── */
.log-tabs{display:flex;border-bottom:1px solid rgba(242,234,216,.06);margin-bottom:14px}
.log-tab{padding:6px 16px;background:none;border:none;border-bottom:1.5px solid transparent;margin-bottom:-1px;font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.12em;text-transform:uppercase;color:rgba(242,234,216,.24);cursor:pointer;transition:color .15s}
.log-tab.on{color:rgba(242,234,216,.66);border-bottom-color:rgba(242,234,216,.30)}
.log-panel{display:none}.log-panel.on{display:block}
.log-inner{display:flex;flex-direction:column;gap:10px}
.btn-row{display:flex;gap:5px;flex-wrap:wrap}
.lcbt{padding:5px 11px;background:none;border:1px solid rgba(242,234,216,.08);font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.08em;text-transform:lowercase;color:rgba(242,234,216,.24);cursor:pointer;transition:all .15s}
.lcbt.on{background:rgba(242,234,216,.04);border-color:rgba(242,234,216,.26);color:rgba(242,234,216,.76)}
.log-input{background:none;border:none;border-bottom:1px solid rgba(242,234,216,.08);font-family:var(--f-disp);font-size:var(--fs-lg);color:rgba(242,234,216,.65);outline:none;padding:5px 0;width:100%}
.log-input::placeholder{color:rgba(242,234,216,.16);font-style:italic}
.log-sub{display:flex;gap:8px;align-items:flex-end}
.log-lis{flex:1;background:none;border:none;border-bottom:1px solid rgba(242,234,216,.06);font-family:var(--f-mono);font-size:var(--fs-sm);color:rgba(242,234,216,.44);outline:none;padding:5px 0}
.log-lis::placeholder{color:rgba(242,234,216,.14)}
.log-go{padding:5px 14px;background:none;border:1px solid rgba(242,234,216,.16);font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.12em;text-transform:uppercase;color:rgba(242,234,216,.36);cursor:pointer;flex-shrink:0}
.recent{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.re-c{font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.10em;text-transform:uppercase;width:auto;flex-shrink:0}
.re-t{font-family:var(--f-disp);font-style:italic;font-size:var(--fs-md);color:rgba(242,234,216,.60);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
.re-a{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.16);flex-shrink:0}

/* ── FEED ── */
.feed-grid{columns:2;column-gap:8px}
@media(min-width:800px){.feed-grid{columns:3}}
.feed-card{break-inside:avoid;margin-bottom:8px;border:1px solid rgba(242,234,216,.05);background:rgba(242,234,216,.012);overflow:hidden}
.feed-card img{width:100%;display:block}
.feed-card-body{padding:8px 10px}
.feed-card-title{font-family:var(--f-disp);font-style:italic;font-size:var(--fs-md);color:rgba(242,234,216,.52);line-height:1.3;margin-bottom:4px}
.feed-card-meta{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.16);letter-spacing:.06em}
.feed-card-text{font-family:var(--f-text);font-size:var(--fs-sm);color:rgba(242,234,216,.30);line-height:1.6;margin-bottom:4px}
.feed-card a{color:rgba(242,234,216,.34);text-decoration:none;border-bottom:1px solid rgba(242,234,216,.08)}
.feed-card a:hover{color:rgba(242,234,216,.62)}
.feed-src{display:flex;gap:10px;margin-bottom:12px}
.feed-src-btn{padding:5px 11px;background:none;border:1px solid rgba(242,234,216,.08);font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.08em;text-transform:lowercase;color:rgba(242,234,216,.22);cursor:pointer;transition:all .15s}
.feed-src-btn.on{background:rgba(242,234,216,.04);border-color:rgba(242,234,216,.26);color:rgba(242,234,216,.72)}
.feed-loading{font-family:var(--f-mono);font-size:var(--fs-xs);color:rgba(242,234,216,.16);padding:20px 0;text-align:center;letter-spacing:.12em;text-transform:uppercase}
.feed-empty{font-family:var(--f-text);font-style:italic;font-size:var(--fs-md);color:rgba(242,234,216,.22);padding:20px 0;text-align:center}

/* ── ARENA ── */
.arena-src-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.arena-src-btn{padding:5px 11px;background:none;border:1px solid rgba(242,234,216,.08);font-family:var(--f-mono);font-size:var(--fs-xs);letter-spacing:.08em;text-transform:lowercase;color:rgba(242,234,216,.24);cursor:pointer;transition:all .15s}
.arena-src-btn.on{background:rgba(242,234,216,.04);border-color:rgba(242,234,216,.26);color:rgba(242,234,216,.72)}
.arena-grid-wrap{overflow-y:auto}
.arena-grid{columns:2;column-gap:6px}
@media(min-width:600px){.arena-grid{columns:3}}
@media(min-width:900px){.arena-grid{columns:4}}
.arena-card{break-inside:avoid;margin-bottom:6px;cursor:pointer;overflow:hidden;position:relative}
.arena-card img{width:100%;height:auto;display:block;transition:opacity .35s}
.arena-card:hover img{opacity:.72}
.arena-cap{position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(transparent,rgba(0,0,0,.75));font-family:var(--f-disp);font-style:italic;font-size:var(--fs-sm);color:rgba(242,234,216,.68);line-height:1.3;opacity:0;transition:opacity .25s}
.arena-card:hover .arena-cap{opacity:1}

/* ── GALLERY ── */
.gal-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.gal-grid{columns:2;column-gap:9px}
@media(min-width:520px){.gal-grid{columns:3}}

function fetchCosmos(boardId,cb){
  if(_cosmosCache[boardId])return cb(_cosmosCache[boardId]);
  fetch(COSMOS_GQL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query:'{ cluster(id:'+boardId+') { elements { items { id type image { url width height } } } } }'})
  }).then(function(r){return r.json();})
    .then(function(d){
      var items=((d.data||{}).cluster||{}).elements||{};
      var imgs=(items.items||[]).filter(function(b){return b.image&&b.image.url;});
      _cosmosCache[boardId]=imgs;cb(imgs);
    }).catch(function(){cb([]);});
}
function renderCosmosGrid(){
  var grid=document.getElementById('arena-grid');
  if(!grid)return;
  var allImgs=[];
  COSMOS_BOARDS.forEach(function(board){
    var show=!_cosmosCatFilter||board.tags.indexOf(_cosmosCatFilter)>=0;
    if(show)(_cosmosCache[board.id]||[]).forEach(function(img){allImgs.push(img);});
  });
  grid.innerHTML='';
  if(!allImgs.length){grid.innerHTML='<div class="feed-empty">nothing here</div>';return;}
  allImgs.forEach(function(b){
    var card=document.createElement('div');card.className='arena-card';
    card.innerHTML='<img src="'+b.image.url+'?w=600" alt="" loading="lazy">';
    grid.appendChild(card);
  });
}
function setCosmosCat(cat){
  _cosmosCatFilter=(_cosmosCatFilter===cat)?'':cat;
  document.querySelectorAll('.cosmos-cat-btn').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-cat')===_cosmosCatFilter);});
  renderCosmosGrid();
}
function loadAllCosmos(){
  var loaded=0;
  COSMOS_BOARDS.forEach(function(board){
    fetchCosmos(board.id,function(){loaded++;if(loaded===COSMOS_BOARDS.length)renderCosmosGrid();});
  });
}

function loadFeed(grid){
  grid.innerHTML='<div class="feed-loading">loading\u2026</div>';
  if(feedSource==='arena'){
    if(feedCache){renderArenaFeed(grid,feedCache);return;}
    fetch(ARENA_API+'/users/'+ARENA_USER+'/channels?per=8')
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(data){
      var channels=data.channels||data||[];
      if(!channels.length){
        grid.innerHTML='<div class="feed-empty">No public channels found.<br><span style="font-family:Space Mono,monospace;font-size:var(--fs-xs);color:rgba(255,255,255,.18);display:block;margin-top:8px">Make sure your Are.na channels are set to "public" visibility.</span></div>';
        return;
      }
      var loaded=0,allBlocks=[];
      channels.slice(0,6).forEach(function(ch){
        fetch(ARENA_API+'/channels/'+ch.slug+'/contents?per=12')
        .then(function(r){return r.ok?r.json():null;})
        .then(function(d){
          if(d){var blocks=d.contents||d||[];blocks.forEach(function(bl){bl._channel=ch.title;allBlocks.push(bl);});}
          loaded++;
          if(loaded>=Math.min(channels.length,6)){
            allBlocks.sort(function(a,b){return new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at);});
            feedCache=allBlocks;
            renderArenaFeed(grid,allBlocks);
          }
        }).catch(function(){loaded++;if(loaded>=Math.min(channels.length,6)&&allBlocks.length){feedCache=allBlocks;renderArenaFeed(grid,allBlocks);}});
      });
    })
    .catch(function(err){
      grid.innerHTML='<div class="feed-empty">Could not load Are.na<br><span style="font-family:Space Mono,monospace;font-size:var(--fs-xs);color:rgba(255,255,255,.18);display:block;margin-top:8px">Error: '+err.message+'<br>Your channels may be set to "closed" or "private".<br>Change them to "public" in Are.na settings.</span><br><a href="https://www.are.na/'+ARENA_USER+'" target="_blank" rel="noopener" style="font-family:Space Mono,monospace;font-size:var(--fs-xs);color:rgba(255,255,255,.30);border-bottom:1px solid rgba(255,255,255,.10);margin-top:12px;display:inline-block">view profile on are.na \u2192</a></div>';
    });
  }else{
    grid.innerHTML='<div class="feed-empty" style="padding:30px 0"><div style="margin-bottom:10px">Pinterest doesn\u2019t offer a public API.</div><a href="https://pin.it/JzITXV9ok" target="_blank" rel="noopener" style="font-family:Space Mono,monospace;font-size:var(--fs-xs);color:rgba(255,255,255,.35);border-bottom:1px solid rgba(255,255,255,.10)">view board on pinterest \u2192</a></div>';
  }
}

    }

    if(bl.title&&bl.title!==bl.source&&bl.title!==''){var t=document.createElement('div');t.className='feed-card-title';t.textContent=bl.title;body.appendChild(t);}
    if(bl.content_html&&bl.class==='Text'){var tx=document.createElement('div');tx.className='feed-card-text';tx.innerHTML=bl.content_html.substring(0,200);body.appendChild(tx);}
    if(bl.source&&bl.source.url){var a=document.createElement('a');a.href=bl.source.url;a.target='_blank';a.rel='noopener';a.textContent=bl.source.title||'source';body.appendChild(a);}

}

function tick(){T+=.012;for(var i=mouseTrail.length-1;i>=0;i--){mouseTrail[i][2]-=.018;if(mouseTrail[i][2]<=0)mouseTrail.splice(i,1);}for(var k=popRings.length-1;k>=0;k--){var pr=popRings[k];pr.r+=(pr.rMax-pr.r)*.26;pr.life-=.032;if(pr.life<=0)popRings.splice(k,1);}for(var j=popParticles.length-1;j>=0;j--){var pp=popParticles[j];pp.vy+=pp.ay;pp.x+=pp.vx;pp.y+=pp.vy;pp.vx*=pp.drag;pp.vy*=pp.drag;pp.life-=pp.mist?0.016:0.021;if(pp.life<=0)popParticles.splice(j,1);}if(CTX){drawField();drawBubbles();drawPopRings();drawPopParticles();}requestAnimationFrame(tick);}
function drawPopRings(){if(!popRings.length)return;CTX.save();CTX.globalCompositeOperation='screen';popRings.forEach(function(pr){var t=pr.life;if(t<=0)return;CTX.strokeStyle='rgba(255,255,255,'+(t*.42).toFixed(3)+')';CTX.lineWidth=2.2*t;CTX.beginPath();CTX.arc(pr.x,pr.y,pr.r,0,Math.PI*2);CTX.stroke();CTX.strokeStyle='rgba(200,234,255,'+(t*.22).toFixed(3)+')';CTX.lineWidth=.9*t;CTX.stroke();});CTX.restore();}
function drawPopParticles(){if(!popParticles.length)return;CTX.save();CTX.globalCompositeOperation='screen';popParticles.forEach(function(p){var t=p.life;if(t<=0)return;var rad=p.sz*t,al=t*(p.mist?0.32:0.52);var g=CTX.createRadialGradient(p.x,p.y,0,p.x,p.y,rad*1.35);g.addColorStop(0,'rgba(255,255,255,'+(al*.92).toFixed(3)+')');g.addColorStop(.45,'rgba(232,248,255,'+(al*.45).toFixed(3)+')');g.addColorStop(1,'rgba(210,235,255,0)');CTX.fillStyle=g;CTX.beginPath();CTX.arc(p.x,p.y,rad,0,Math.PI*2);CTX.fill();});CTX.restore();}

      +'<div id="tut-mode-circ-'+mo.m+'" style="width:28px;height:28px;border-radius:50%;background:'+bg+';margin:0 auto 6px;border:2px solid rgba(255,255,255,'+(on?'.65':'.12')+');transition:border-color .2s;box-sizing:border-box"></div>'
      +'<div style="font-family:Space Mono,monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,'+(on?'.55':'.18')+');line-height:1.5" id="tut-mode-lbl-'+mo.m+'">'
      +'<div>'+pct+'</div><div>'+mo.label+'</div>'
      +'</div></div>';
  }).join('')+'</div>';
  return schHtml+modeHtml;
}
function refreshTutModes(){
  var acc=getAccRGB();
  [{m:'mono'},{m:'duo'},{m:'multi'}].forEach(function(mo){
    var circ=document.getElementById('tut-mode-circ-'+mo.m);
    var lbl=document.getElementById('tut-mode-lbl-'+mo.m);
    if(!circ)return;
    if(mo.m==='mono')circ.style.background='rgb(88,88,82)';
    else if(mo.m==='duo')circ.style.background='linear-gradient(135deg,rgb('+acc+'),rgb(88,88,82))';
    else circ.style.background=multiCircleBg();
    var on=galColorMode===mo.m;
    circ.style.borderColor=on?'rgba(255,255,255,.65)':'rgba(255,255,255,.12)';
    if(lbl)lbl.style.color=on?'rgba(255,255,255,.55)':'rgba(255,255,255,.18)';
  });
}
function renderTutStep(){if(tutStep===-1){tutCard.innerHTML='<div style="text-align:center;margin-bottom:14px"><span class="oo-mark" style="font-size:36px;color:rgba(255,255,255,.25)"><span class="o1">O</span><span class="o2">O</span></span></div><div class="tut-title">Before we begin.</div><div class="tut-body" style="font-size:var(--fs-sm)"><div style="margin-bottom:6px;color:rgba(255,255,255,.30)">Choose a palette:</div>'+buildTutPalette()+'<div style="margin-top:14px;color:rgba(255,255,255,.22)">You can change this anytime.</div></div><div class="tut-nav" style="margin-top:16px"><div></div><div style="display:flex;gap:8px;align-items:center"><button class="tut-skip" onclick="closeTut()">skip tour</button><button class="tut-btn" onclick="nextTut()">show me around</button></div></div>';return;}var s=TUT_STEPS[tutStep],dots='',isLast=(tutStep===TUT_STEPS.length-1);for(var i=0;i<TUT_STEPS.length;i++)dots+='<div class="tut-dot'+(i===tutStep?' on':'')+'"></div>';tutCard.innerHTML='<div class="tut-step">'+(tutStep+1)+' / '+TUT_STEPS.length+'</div><div class="tut-title">'+s.t+'</div><div class="tut-body">'+s.b+'</div><div class="tut-nav"><div class="tut-dots">'+dots+'</div><div style="display:flex;gap:8px;align-items:center">'+(isLast?'':'<button class="tut-skip" onclick="closeTut()">skip</button>')+'<button class="tut-btn" onclick="'+(isLast?'closeTut()':'nextTut()')+'">'+(isLast?'let&#39;s go':'next')+'</button></div></div>';}
function nextTut(){tutStep++;if(tutStep>=TUT_STEPS.length){closeTut();return;}renderTutStep();}
function closeTut(){if(window._fm){window._fm.animate(tutEl,{opacity:[1,0]},{duration:.35,ease:[.4,0,1,1],onComplete:function(){tutEl.classList.remove('on');tutEl.style.opacity='';}});}else{tutEl.classList.remove('on');}}
function maybeShowTut(){tutStep=-1;renderTutStep();setTimeout(function(){tutEl.classList.add('on');tutEl.style.opacity='0';if(window._fm){window._fm.animate(tutEl,{opacity:[0,1]},{duration:.5,ease:[.16,1,.3,1]});}else{tutEl.style.opacity='';}},600);}
document.addEventListener('keydown',function(ev){if(ev.key==='Escape'){if(tutEl.classList.contains('on'))closeTut();else if(drawerMode)closeDrawer();else if(document.getElementById('image-view').classList.contains('on')||document.getElementById('feed-overlay').classList.contains('on')){setMainView('log');}else closeThemeChooser();}});

</script>

  window._fm={animate:fm.animate,stagger:fm.stagger};
  document.dispatchEvent(new CustomEvent('fm:ready'));
}).catch(function(){
  document.dispatchEvent(new CustomEvent('fm:ready'));
});
